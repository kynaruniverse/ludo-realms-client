plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ludoforge'
    compileSdk 34

    defaultConfig {
        applicationId "com.ludoforge"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        // Important for WebView Canvas performance
        renderscriptSupportModeEnabled true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // Enable hardware acceleration for better Canvas rendering
    buildFeatures {
        buildConfig true
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    // Optional: Better WebView support
    // implementation 'androidx.webkit:webkit:1.8.0'
}