<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LudoForge v1.0</title>
  <style>
    body { margin:0; padding:0; background:#111; font-family:Arial, sans-serif; overflow:hidden; touch-action: none; }
    canvas { display:block; margin:0 auto; background:#000; box-shadow:0 0 30px rgba(0,0,0,0.8); }
    #overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; color: white; padding: 15px; box-sizing: border-box;
    }
    #status {
      font-size: 20px; text-align: center; margin-bottom: 10px;
      text-shadow: 0 2px 8px #000; font-weight: bold;
    }
    #dice {
      width: 90px; height: 90px; font-size: 48px; line-height: 90px;
      background: #fff; color: #000; border-radius: 20px; margin: 0 auto;
      text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      pointer-events: all; cursor: pointer; user-select: none;
    }
    #info { position: absolute; bottom: 15px; left: 15px; font-size: 14px; }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="640" height="680"></canvas>
  
  <div id="overlay">
    <div id="status">Yellow's Turn • Tap Dice to Roll</div>
    <div id="dice" onclick="rollDiceUI()">🎲</div>
    <div id="info">LudoForge v1.0 • Human: Yellow (Bottom)</div>
  </div>

  <script type="module">
    import { LudoGame } from './engine/ludo-logic.js';
    import { CanvasRenderer } from './render/canvas-renderer.js';
    import { AIPlayer } from './ai/ai-player.js';
    import { setupUI } from './ui/ui-controls.js';

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: true });
    
    const game = new LudoGame();
    const renderer = new CanvasRenderer(ctx, 640, 680);
    
    const ais = [
      new AIPlayer('medium'), // Red 0
      new AIPlayer('medium'), // Blue 1
      new AIPlayer('hard')    // Green 2
      // Yellow 3 = Human
    ];

    let selectedTokenIndex = null;
    let isProcessing = false;

    async function processAITurn() {
      if (game.currentPlayerIndex === 3 || game.gameOver || isProcessing) return;
      isProcessing = true;
      
      const playerColor = game.players[game.currentPlayerIndex].color.toUpperCase();
      document.getElementById('status').textContent = `${playerColor} is thinking...`;
      
      await new Promise(r => setTimeout(r, 600));
      
      const roll = game.rollDice();
      document.getElementById('dice').textContent = roll;
      document.getElementById('status').textContent = `${playerColor} rolled ${roll}`;
      
      await new Promise(r => setTimeout(r, 800));
      
      const tokenIdx = ais[game.currentPlayerIndex].chooseMove(game, game.currentPlayerIndex, roll);
      if (tokenIdx !== null) {
        game.moveToken(game.currentPlayerIndex, tokenIdx, roll);
        renderer.animateCaptureOrFinish();
      }
      
      if (game.isGameOver()) {
        document.getElementById('status').textContent = `🎉 ${game.winner.toUpperCase()} WINS!`;
        alert(`🎉 ${game.winner.toUpperCase()} Wins the Game!`);
      } else {
        game.nextTurn();
        document.getElementById('status').textContent = `${game.players[game.currentPlayerIndex].color.toUpperCase()}'s Turn`;
      }
      
      isProcessing = false;
    }

    window.rollDiceUI = async () => {
      if (game.currentPlayerIndex !== 3 || game.gameOver || isProcessing) return;
      isProcessing = true;
      
      const roll = game.rollDice();
      document.getElementById('dice').textContent = roll;
      document.getElementById('status').textContent = `You rolled ${roll}! ${game.extraTurn ? 'Extra Turn!' : ''}`;
      
      await new Promise(r => setTimeout(r, 400));
      
      const movable = game.getMovableTokens(3, roll);
      
      if (movable.length === 0) {
        document.getElementById('status').textContent = "No moves possible. Turn passed.";
        await new Promise(r => setTimeout(r, 1200));
        game.nextTurn();
        isProcessing = false;
        processAITurn();
        return;
      }
      
      if (movable.length === 1) {
        game.moveToken(3, movable[0], roll);
        renderer.animateCaptureOrFinish();
        if (game.isGameOver()) {
          document.getElementById('status').textContent = "🎉 YOU WIN!";
          alert("🎉 Congratulations! You Win!");
        } else if (!game.extraTurn) {
          await new Promise(r => setTimeout(r, 800));
          game.nextTurn();
        }
      } else {
        // For multiple options: highlight in renderer (basic version auto-selects first for simplicity)
        // In full production tap selection would be added via canvas click
        game.moveToken(3, movable[0], roll);
        renderer.animateCaptureOrFinish();
        if (game.isGameOver()) {
          document.getElementById('status').textContent = "🎉 YOU WIN!";
          alert("🎉 Congratulations! You Win!");
        } else if (!game.extraTurn) {
          await new Promise(r => setTimeout(r, 800));
          game.nextTurn();
        }
      }
      
      isProcessing = false;
      
      if (!game.extraTurn && !game.gameOver) {
        setTimeout(processAITurn, 600);
      }
    };

    // Touch support for canvas (basic)
    canvas.addEventListener('touchstart', (e) => {
      // Future: token selection logic
      e.preventDefault();
    });

    setupUI(game, renderer);
    renderer.drawBoard(); // Initial draw
    document.getElementById('status').textContent = "Yellow's Turn • Tap Dice";
    
    // Game loop
    function gameLoop() {
      renderer.clear();
      renderer.drawBoard();
      renderer.drawTokens(game.players);
      renderer.drawDice(game.diceValue);
      requestAnimationFrame(gameLoop);
    }
    
    gameLoop();
  </script>
</body>
</html>
