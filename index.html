<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#29B6F6" />
  <title>Ludo Realms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">

    <header id="game-header">
      <div id="logo-wrap">
        <span id="logo">🎲 Ludo Realms</span>
      </div>
      <div id="turn-badge">
        <span id="turn-dot"></span>
        <span id="current-colour">RED</span>
        <span id="status-text">TAP ROLL</span>
      </div>
    </header>

    <main id="game-area">
      <canvas id="board-canvas"></canvas>
    </main>

    <footer id="game-hud">
      <div class="hud-block" id="hud-players">
        <div class="hud-label">PLAYERS</div>
        <div id="player-pips">
          <div class="pip pip-red"    id="pip-red"></div>
          <div class="pip pip-green"  id="pip-green"></div>
          <div class="pip pip-yellow" id="pip-yellow"></div>
          <div class="pip pip-blue"   id="pip-blue"></div>
        </div>
      </div>

      <div class="hud-block" id="hud-dice">
        <div id="dice-face"><span id="dice-value">?</span></div>
        <button id="btn-roll">ROLL</button>
      </div>

      <div class="hud-block" id="hud-info">
        <div class="hud-label">MANA</div>
        <div id="mana-pips">
          <div class="mana-pip" id="mp1"></div>
          <div class="mana-pip" id="mp2"></div>
          <div class="mana-pip" id="mp3"></div>
          <div class="mana-pip" id="mp4"></div>
          <div class="mana-pip" id="mp5"></div>
        </div>
        <div id="last-log"></div>
      </div>
    </footer>

  </div>

  <div id="winner-overlay">
    <div id="winner-box">
      <div id="winner-crown">🏆</div>
      <div id="winner-msg"></div>
      <div id="winner-sub">All tokens home!</div>
      <button id="btn-restart" onclick="window.gameController.startGame(4)">PLAY AGAIN</button>
    </div>
  </div>

  <script src="js/game.js"></script>
  <script src="js/board.js"></script>
</body>
</html>
