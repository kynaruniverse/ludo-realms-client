<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ludo Master • God-Tier</title>
    <link rel="stylesheet" href="ui/styles.css">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div class="ui-overlay">
            <div class="dice-area">
                <canvas id="diceCanvas" width="80" height="80"></canvas>
                <button id="rollBtn" class="btn primary">ROLL</button>
            </div>
            <div class="controls">
                <div class="player-turn">🔴 Red's turn</div>
                <div class="game-status"></div>
                <div class="ai-controls">
                    <label>🤖 AI Difficulty:</label>
                    <select id="difficultySelect">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                    <button id="aiToggleBtn" class="btn">AI: ON</button>
                </div>
                <button id="newGameBtn" class="btn secondary">New Game</button>
            </div>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
